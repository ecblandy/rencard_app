<div class="flex items-center justify-center gap-3 mt-[5rem]">
  @for (step of steps(); track step) {
    <div class="flex items-center gap-[1rem]">
      <!-- número -->
      <span
        class="flex items-center justify-center rounded-[.5rem] h-[3.6875rem] w-[3.6875rem] text-[1.5rem] font-bold text-white transition"
        [class.bg-black]="step <= currentStep()"
        [class.bg-neutral-400]="step > currentStep()"
      >
        {{ step }}
      </span>

      <!-- barra (somente se NÃO for o último) -->
      @if (step < totalSteps()) {
        <div
          class="h-[.125rem] w-10 rounded transition"
          [class.bg-black]="step < currentStep()"
          [class.bg-neutral-300]="step >= currentStep()"
        ></div>
      }
    </div>
  }
</div>
