<app-surface>
  <app-surface-title
    title="Configurações gerais"
    description="Ajustes de URL, privacidade e reset"
  />

  <form class="flex-1 my-[3.5rem] space-y-[3.5rem]" (submit)="onSubmit($event)">
    <fieldset class="space-y-[1.5rem]">
      <span class="font-urbanist font-semibold text-[1.25rem]">URL personalizado</span>
      <div class="flex border border-neutral-soft rounded-[.625rem] my-[.5rem]">
        <p
          class="flex items-center justify-center font-manrope font-semibold bg-[#F5F5F5] text-neutral-medium border-r border-neutral-soft max-w-[7.75rem] w-full h-[2.375rem] rounded-l-[.625rem]"
        >
          rencard.app/
        </p>
        <input
          type="text"
          [formField]="settingsForm.custom_url"
          class="flex items-center pl-[.625rem] font-manrope font-semibold text-neutral-soft w-full h-[2.375rem] rounded-r-[.625rem] outline-none bg-transparent"
          placeholder="seu-usuario"
        />
      </div>
      <span class="font-manrope font-medium text-[.875rem] text-neutral-extra-soft"
        >Escolha uma URL única para compartilhar seu perfil.</span
      >
    </fieldset>

    <div class="bg-[#e2e2e2] w-full rounded-[.625rem] px-[1rem] py-[1.5rem] h-auto">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-[.75rem]">
          <ng-icon name="lucideLockKeyhole" size="20"></ng-icon>
          <span class="font-urbanist font-semibold text-[1.25rem]">Perfil privado</span>
        </div>

        <app-switch-button [checked]="isPrivate()" (checkedChange)="togglePrivate($event)" />
      </div>
      <span class="font-manrope font-medium text-[.875rem] text-neutral-soft"
        >Somente você pode ver o perfil</span
      >
    </div>

    <app-button
      type="submit"
      [disabled]="!settingsForm().valid() || (!settingsForm().dirty() && !isPrivateDirty())"
      class="w-full mt-[.625rem]"
    >
      Salvar
    </app-button>
  </form>
</app-surface>
