<app-modal [isOpen]="isOpen()" (close)="close.emit()" class="">
  <div class="w-full rounded-xl bg-white shadow-xl p-6">
    <header class="">
      <h2 class="font-urbanist font-semibold text-[1.5rem]">Confirmar alteração de e-mail</h2>
      <p class="font-manrope font-semibold text-neutral-strong">Etapa 1 de 2</p>
    </header>

    <span class="block font-manrope mt-[2.125rem]">
      Enviamos um código de verificação para o seu e-mail cadastrado . Digite o código abaixo para
      continuar.
    </span>

    <section class="space-y-4 py-6">
      <div>
        <app-label>Código de verificação</app-label>
        <app-input type="text" placeholder="Digite o código de verificação" />
      </div>
    </section>

    <footer class="flex items-center justify-between gap-4">
      <app-button variant="outline" (click)="close.emit()" class="flex-1 w-full"
        >Cancelar</app-button
      >
      <app-button (click)="submit()" class="flex-1 w-full">Confirmar</app-button>
    </footer>
  </div>
</app-modal>
