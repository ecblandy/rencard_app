<app-auth-form
  title="Verifique seu e-mail"
  subtitle="Enviamos um código de confirmação para o seu e-mail."
  (submitForm)="onSubmit($event)"
>
  <!-- Code -->
  <div class="flex flex-col gap-[.5rem]">
    <app-label variant="auth" for="code">Código de verificação</app-label>
    <app-input
      variant="default"
      id="code"
      type="text"
      inputmode="numeric"
      maxlength="6"
      placeholder="Digite o código enviado."
      sizeH="xl"
      [formField]="confirmEmailForm.code"
    />
    <!-- Email error message -->
    @if (confirmEmailForm.code().touched() && confirmEmailForm.code().invalid()) {
      <ul>
        @for (error of confirmEmailForm.code().errors(); track error) {
          <li class="text-error">{{ error.message }}</li>
        }
      </ul>
    }
  </div>

  <app-button type="submit" class="w-full" sizeH="xl">Confirmar código</app-button>
</app-auth-form>
