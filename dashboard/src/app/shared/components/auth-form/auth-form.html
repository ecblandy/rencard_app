<div
  class="flex flex-col items-center bg-[linear-gradient(360deg,_#FBFBFB_35%,_#F5F5F5_100%)] pt-[2.5rem] pb-[3.125rem] px-[1.25rem]"
>
  <section
    class="flex flex-col items-center gap-[.6875rem] justify-center font-urbanist max-w-[35.375rem] w-full text-center"
  >
    <h1 class="font-bold text-[2.5rem] max-sm:text-[2rem] leading-[100%]">{{ title() }}</h1>
    <p class="font-semibold text-[1.5rem] max-sm:text-[1.25rem] text-neutral-medium">
      {{ subtitle() }}
    </p>
  </section>
  <form
    class="flex flex-col gap-[2rem] mt-[3.125rem] max-w-[35.375rem] w-full"
    (submit)="onSubmit($event)"
  >
    <ng-content></ng-content>
  </form>
</div>
