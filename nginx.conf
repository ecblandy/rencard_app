server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect /app to /app/ for the dashboard SPA
    location = /app {
        return 302 /app/;
    }

    # Serve Angular dashboard under /app/
    location /app/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /app/index.html;
    }

    # Serve landing page on root
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Next.js static assets may use /_next/ paths
    location /_next/ {
        try_files $uri $uri/ /index.html;
    }
}
