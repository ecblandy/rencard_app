server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect /app → /app/
    location = /app {
        return 302 /app/;
    }

    # Angular SPA sob /app/
    location /app/ {
        alias /usr/share/nginx/html/app/;
        try_files $uri $uri/ /index.html;
    }

    # Assets estáticos do Next.js
    location /_next/ {
        try_files $uri =404;
    }

    # Landing page Next.js (raiz)
    location / {
        try_files $uri $uri/ /index.html;
    }
}